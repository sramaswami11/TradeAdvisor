<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in – Trade Advisor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

<div class="card">
    <h2>Trade Advisor</h2>
    <div class="subtitle">Sign in to manage your tickers</div>

    <form method="POST">
        <input type="text"  name="name"  placeholder="Your name (e.g. John)" required>
        <input type="email" name="email" placeholder="you@example.com" required>
        <button type="submit">Continue</button>
    </form>

    <div class="footer">No password required · Local-first login</div>

    <div class="guest-link">
        <a href="{{ url_for('guest') }}">Continue as Guest</a>
        <span class="hint">Mag 7 stocks · no sign-in needed</span>
    </div>
</div>

</body>
</html>
